<h1 class="page-title">订单管理</h1>

<!-- 筛选区域 -->
<div class="filters">
  <div class="filter-row">
    <div class="filter-group">
      <label>开始日期</label>
      <input type="date" [(ngModel)]="filters.startDate" />
    </div>
    
    <div class="filter-group">
      <label>结束日期</label>
      <input type="date" [(ngModel)]="filters.endDate" />
    </div>
    
    <div class="filter-group">
      <label>订单状态</label>
      <select [(ngModel)]="filters.status">
        <option value="">全部状态</option>
        <option *ngFor="let s of orderStatuses" [value]="s.value">{{ s.label }}</option>
      </select>
    </div>
    
    <div class="filter-group">
      <label>最小金额</label>
      <input type="number" [(ngModel)]="filters.minAmount" placeholder="0" />
    </div>
    
    <div class="filter-group">
      <label>最大金额</label>
      <input type="number" [(ngModel)]="filters.maxAmount" placeholder="不限" />
    </div>
    
    <div class="filter-actions">
      <button class="btn btn-primary" (click)="search()">搜索</button>
      <button class="btn btn-secondary" (click)="resetFilters()">重置</button>
    </div>
  </div>
</div>

<!-- 订单列表 -->
<div class="table-container">
  <div *ngIf="loading" style="text-align: center; padding: 40px;">
    <p>加载中...</p>
  </div>

  <table *ngIf="!loading && orders.length > 0">
    <thead>
      <tr>
        <th>订单号</th>
        <th>客户名</th>
        <th>金额</th>
        <th>状态</th>
        <th>下单时间</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let order of orders">
        <td>{{ order.orderNo }}</td>
        <td>{{ order.customerName }}</td>
        <td>{{ formatCurrency(order.totalAmount) }}</td>
        <td>
          <span class="status-badge" [class]="getStatusClass(order.status)">
            {{ order.statusName }}
          </span>
        </td>
        <td>{{ formatDate(order.createdAt) }}</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && orders.length === 0" style="text-align: center; padding: 40px; color: #718096;">
    <p>暂无订单数据</p>
  </div>

  <!-- 分页 -->
  <div *ngIf="!loading && totalPages > 1" class="pagination">
    <button 
      class="pagination-btn" 
      (click)="goToPage(1)" 
      [disabled]="currentPage === 1"
    >
      首页
    </button>
    
    <button 
      class="pagination-btn" 
      (click)="goToPage(currentPage - 1)" 
      [disabled]="currentPage === 1"
    >
      上一页
    </button>
    
    <ng-container *ngFor="let page of getPageNumbers()">
      <button 
        class="pagination-btn" 
        [class.active]="currentPage === page"
        (click)="goToPage(page)"
      >
        {{ page }}
      </button>
    </ng-container>
    
    <button 
      class="pagination-btn" 
      (click)="goToPage(currentPage + 1)" 
      [disabled]="currentPage === totalPages"
    >
      下一页
    </button>
    
    <button 
      class="pagination-btn" 
      (click)="goToPage(totalPages)" 
      [disabled]="currentPage === totalPages"
    >
      末页
    </button>
    
    <span class="pagination-info">
      共 {{ total }} 条，第 {{ currentPage }}/{{ totalPages }} 页
    </span>
  </div>
</div>
