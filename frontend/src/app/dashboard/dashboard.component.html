<div *ngIf="loading" class="loading">
  <p>加载中...</p>
</div>

<div *ngIf="!loading && dashboardData" class="dashboard-container">
  <div class="page-header">
    <h1 class="page-title">销售数据看板</h1>
    <button class="btn btn-primary export-btn" (click)="exportToExcel()">
      导出报表
    </button>
  </div>

  <div class="stats-grid">
    <div class="stat-card sales">
      <div class="label">今日销售额</div>
      <div class="value">{{ formatCurrency(dashboardData.todaySales) }}</div>
    </div>

    <div class="stat-card orders">
      <div class="label">今日订单数</div>
      <div class="value">{{ dashboardData.todayOrders }}</div>
    </div>

    <div class="stat-card month-sales">
      <div class="label">本月销售额</div>
      <div class="value">{{ formatCurrency(dashboardData.monthSales) }}</div>
    </div>

    <div class="stat-card month-orders">
      <div class="label">本月订单数</div>
      <div class="value">{{ dashboardData.monthOrders }}</div>
    </div>
  </div>

  <div class="charts-container">
    <div class="chart-card full-width">
      <div class="chart-header">
        <h3>订单趋势</h3>
        <div class="chart-controls">
          <select
            class="time-range-select"
            [value]="timeRange"
            (change)="onTimeRangeChange($any($event.target).value)"
          >
            <option
              *ngFor="let option of timeRangeOptions"
              [value]="option.value"
            >
              {{ option.label }}
            </option>
          </select>
        </div>
      </div>
      <div class="chart-wrapper" #orderTrendChart></div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <h3>商品销量 TOP10</h3>
        <div class="chart-wrapper" #productTop10Chart></div>
        <div class="chart-tip">点击柱子可查看商品详情</div>
      </div>

      <div class="chart-card">
        <h3>订单状态分布</h3>
        <div class="chart-wrapper" #orderStatusChart></div>
      </div>
    </div>
  </div>
</div>
